# Core hypothesis grid: H1 (full vs bc_dagger), H2 (full vs rac_noreroute).
# 9 runs — calibrated to ~118h sequential on one RTX 4090 (see make plan-5day).
conditions:
  - name: bc_dagger
    stages: [collect_bc, train_bc, dagger_rac, evaluate_val]
    rac_enabled: false
  - name: rac_noreroute
    stages: [collect_bc, train_bc, dagger_rac, curriculum, evaluate_val]
    reroute_enabled: false
  - name: full
    stages: [collect_bc, train_bc, dagger_rac, curriculum, evaluate_val, ppo, evaluate_test, verdicts, report_assets]
    rac_enabled: true
    reroute_enabled: true
seeds: [0, 1, 2]
priority: [full, rac_noreroute, bc_dagger]
dep_timeout_h: 48
ppo:
  requires: [rac_noreroute.curriculum.eval_val]
