name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Lint
        run: make lint
      - name: Type check
        run: make type
      - name: Constants
        run: make check-spec
      - name: Tests
        run: make test
        env:
          MUJOCO_GL: egl
          PYTHONPATH: src
          WANDB_MODE: offline
          HDF5_USE_FILE_LOCKING: "FALSE"
      - name: Smoke
        run: python3 scripts/00_smoke.py
        env:
          MUJOCO_GL: egl
          PYTHONPATH: src
